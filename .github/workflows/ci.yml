name: CI

on:
  release:
    types: [published]
    
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['2.7', '3.0', '3.1', '3.2', '3.3', '3.4']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: Run tests
      run: bundle exec rspec
      env:
        TAPSILAT_API_TOKEN: ${{ secrets.TAPSILAT_API_TOKEN }}

    - name: Run RuboCop
      run: bundle exec rubocop

    - name: Generate coverage report
      run: bundle exec rake coverage
      env:
        COVERAGE: true
        TAPSILAT_API_TOKEN: ${{ secrets.TAPSILAT_API_TOKEN }}

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.ruby-version == '3.4'
      with:
        file: ./coverage/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true

    - name: Run bundle audit
      run: |
        gem install bundler-audit
        bundle audit check --update 

  publish:
    # Publish gem when a tag like v1.2.3 is pushed
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'
        bundler-cache: true

    - name: Build gem
      run: |
        gem build *.gemspec
        mkdir -p pkg
        mv *.gem pkg/ || true

    - name: Publish to RubyGems
      env:
        RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      run: |
        if [ -z "${RUBYGEMS_API_KEY}" ]; then
          echo "RUBYGEMS_API_KEY is not set. Skipping publish.";
          exit 1;
        fi
        mkdir -p ~/.gem
        printf "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > ~/.gem/credentials
        chmod 0600 ~/.gem/credentials
        ls -la pkg || true
        gem push pkg/*.gem 
